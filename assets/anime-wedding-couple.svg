<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" role="img" aria-labelledby="title desc">
  <title id="title">Soft anime inspired Muslim wedding couple</title>
  <desc id="desc">A gentle hand-painted anime inspired groom and bride seen from behind in traditional wedding attire.</desc>
  <defs>
    <linearGradient id="paperFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#f7ebcf" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="sherwani" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8e8"/>
      <stop offset="0.54" stop-color="#e6d0a7"/>
      <stop offset="1" stop-color="#b9965a"/>
    </linearGradient>
    <linearGradient id="veil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ec" stop-opacity="0.96"/>
      <stop offset="0.55" stop-color="#eadfc9" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#c8b89d" stop-opacity="0.36"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#574036"/>
      <stop offset="1" stop-color="#2d1e1a"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7e1f31"/>
      <stop offset="1" stop-color="#3a0d17"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#1e140f" flood-opacity="0.22"/>
    </filter>
    <filter id="grain" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="12" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.88 0 0 0 0 0.82 0 0 0 0 0.68 0 0 0 .14 0" result="texture"/>
      <feBlend in="SourceGraphic" in2="texture" mode="multiply"/>
    </filter>
  </defs>

  <rect width="520" height="300" fill="none"/>
  <g opacity="0.4">
    <rect x="188" y="52" width="144" height="204" rx="72" fill="url(#paperFade)"/>
    <path d="M385 200 C409 168 433 159 456 171 C438 180 421 203 416 235Z" fill="#7e1f31" opacity="0.16"/>
    <path d="M95 218 C72 190 52 185 33 197 C55 207 66 225 73 250Z" fill="#7e1f31" opacity="0.13"/>
    <path d="M380 220 C398 206 416 203 429 210" fill="none" stroke="#7e1f31" stroke-width="3" stroke-linecap="round" opacity="0.16"/>
  </g>

  <g filter="url(#softShadow)">
    <ellipse cx="260" cy="264" rx="155" ry="19" fill="#1e140f" opacity="0.12"/>

    <g transform="translate(120 38)" filter="url(#grain)">
      <path d="M84 48 C79 24 96 10 121 7 C145 5 165 17 166 39 C154 30 101 28 84 48Z" fill="url(#hair)"/>
      <path d="M79 49 C92 34 156 34 170 51 C160 68 92 67 79 49Z" fill="url(#hair)"/>
      <path d="M92 55 C95 78 112 94 126 94 C144 94 158 77 159 55 C138 64 112 64 92 55Z" fill="#d8b18f"/>
      <path d="M70 97 C48 132 38 192 52 244 C81 261 167 261 196 244 C209 192 198 132 176 97 C151 83 96 83 70 97Z" fill="url(#sherwani)"/>
      <path d="M125 99 L125 250" stroke="#7e1f31" stroke-width="4" opacity="0.32"/>
      <path d="M93 107 C100 148 100 205 89 250" fill="none" stroke="#fff8e8" stroke-width="8" stroke-linecap="round" opacity="0.42"/>
      <path d="M157 107 C150 148 150 205 161 250" fill="none" stroke="#b9965a" stroke-width="8" stroke-linecap="round" opacity="0.28"/>
      <circle cx="125" cy="133" r="4" fill="#caa75a"/>
      <circle cx="125" cy="164" r="3.6" fill="#caa75a"/>
      <circle cx="125" cy="195" r="3.2" fill="#caa75a"/>
      <path d="M65 116 C45 142 39 195 50 231" fill="none" stroke="#e6d0a7" stroke-width="24" stroke-linecap="round"/>
      <path d="M184 116 C203 143 210 194 199 231" fill="none" stroke="#caa75a" stroke-width="24" stroke-linecap="round" opacity="0.82"/>
      <path d="M82 42 C99 32 151 32 166 43" fill="none" stroke="#fff8e8" stroke-width="4" opacity="0.32"/>
    </g>

    <g transform="translate(235 33)" filter="url(#grain)">
      <path d="M77 38 C105 6 163 11 186 47 C214 93 211 185 197 251 C157 269 89 268 50 251 C34 183 33 83 77 38Z" fill="url(#veil)"/>
      <path d="M82 44 C103 26 160 25 181 50" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.5"/>
      <path d="M76 89 C84 70 99 59 129 57 C159 59 176 72 182 91 C165 78 96 77 76 89Z" fill="#d9c6aa" opacity="0.32"/>
      <path d="M86 102 C72 134 63 198 72 252 C102 266 159 266 190 252 C198 198 189 134 174 102 C148 91 111 91 86 102Z" fill="#f3eadc" opacity="0.76"/>
      <path d="M130 101 L130 254" stroke="#7e1f31" stroke-width="3" opacity="0.18"/>
      <path d="M103 117 C94 153 93 204 100 252" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
      <path d="M158 117 C166 153 168 204 160 252" fill="none" stroke="#c8b89d" stroke-width="7" stroke-linecap="round" opacity="0.28"/>
      <g fill="#caa75a" opacity="0.36">
        <circle cx="131" cy="122" r="3"/>
        <circle cx="119" cy="147" r="2.4"/>
        <circle cx="145" cy="158" r="2.4"/>
        <circle cx="124" cy="187" r="2.1"/>
        <circle cx="151" cy="214" r="2.1"/>
      </g>
      <path d="M56 118 C34 148 28 194 43 231" fill="none" stroke="#efe3ce" stroke-width="24" stroke-linecap="round" opacity="0.82"/>
      <path d="M198 118 C220 148 226 194 211 231" fill="none" stroke="#d7c5aa" stroke-width="24" stroke-linecap="round" opacity="0.55"/>
      <path d="M73 71 C93 55 165 54 186 73" fill="none" stroke="#fff" stroke-width="3" opacity="0.42"/>
    </g>
  </g>

  <g transform="translate(245 140)" opacity="0.96">
    <circle cx="15" cy="15" r="15" fill="#fff8ea" stroke="#caa75a" stroke-width="2"/>
    <path d="M5 15 H25" stroke="#7e1f31" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="15" cy="15" r="4.5" fill="#7e1f31"/>
  </g>
</svg>

